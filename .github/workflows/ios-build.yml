name: iOS CI Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build App
        run: |
          xcodebuild clean build \
          -project UIKitTestApp.xcodeproj \
          -scheme UIKitTestApp \
          -destination 'generic/platform=iOS Simulator'

      - name: Archive App (Unsigned)
        run: |
          mkdir -p build
          xcodebuild archive \
          -project UIKitTestApp.xcodeproj \
          -scheme UIKitTestApp \
          -archivePath build/UIKitTestApp.xcarchive \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY=""

      - name: Create IPA manually
        run: |
          mkdir -p build/Payload
          cp -R build/UIKitTestApp.xcarchive/Products/Applications/UIKitTestApp.app build/Payload/
          cd build
          zip -r UIKitTestApp.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/UIKitTestApp.ipa